version: '3.8'

services:
  # ============================================
  # MongoDB
  # ============================================
  mongodb:
    image: mongo:7
    container_name: afm-mongodb
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_DATABASE: afm_workshop
    networks:
      - afm-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ============================================
  # Backend (FastAPI)
  # ============================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: afm-backend
    restart: unless-stopped
    ports:
      - "${BACKEND_PORT:-8001}:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME=afm_workshop
      - CORS_ORIGINS=*
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - afm-network
    healthcheck:
      test: curl -f http://localhost:8001/api/ || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================
  # Frontend (Nginx + React Static Build)
  # ============================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      target: frontend
      args:
        REACT_APP_BACKEND_URL: ${REACT_APP_BACKEND_URL:-}
    container_name: afm-frontend
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      # These are passed to the entrypoint script for dynamic nginx config
      - SERVER_NAME=${SERVER_NAME:-_}
      - EXTERNAL_HTTP_PORT=${HTTP_PORT:-80}
      - EXTERNAL_HTTPS_PORT=${HTTPS_PORT:-443}
      - SSL_ENABLED=${SSL_ENABLED:-auto}
    volumes:
      # Mount SSL certificates — place your certs in ./ssl/
      # If files are missing or empty, the entrypoint falls back to HTTP-only
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - afm-network

volumes:
  mongo_data:
    driver: local

networks:
  afm-network:
    driver: bridge
